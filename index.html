<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OriginLabs</title>
  <style>
    body {
      margin: 0;
      background-color: #000000;
      color: #ffffff;
      font-family: Arial, sans-serif;
    }

    /* Top-left brand */
    .header {
      position: absolute;
      top: 20px;
      left: 30px;
      font-size: 18px;
      font-weight: bold;
    }

    /* Center message */
    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .message {
      font-size: 25px;
      font-weight: normal;
    }
  </style>
</head>

<body>
  <div class="header">OriginLabs</div>

  <div class="container">
    <div class="message">
      We are updating our website. We will be back shortly.
    </div>
  </div>
</body>
</html>
